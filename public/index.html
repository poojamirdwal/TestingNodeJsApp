<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Click Counter</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 2rem; background: #f4f5f7; }
    .container { max-width: 500px; margin: auto; background: #fff; padding: 2rem; border-radius: 12px; box-shadow: 0 6px 18px rgba(0,0,0,.1); }
    button { font-size: 1.1rem; padding: 12px 20px; margin: 10px 0; cursor: pointer; border-radius: 6px; border: none; background: #007bff; color: #fff; }
    button:hover { background: #0056b3; }
    h1, p { margin: 0.5rem 0; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Click Counter</h1>
    <p>Click the button and your clicks will be recorded by the server.</p>
    <p>Current count: <strong id="count">0</strong></p>
    <button id="clickBtn">Click me!</button>
    <button id="resetBtn" style="background:#dc3545;">Reset</button>
    <p id="status"></p>
  </div>
  <script>
    async function fetchCount() {
      const res = await fetch('/api/count');
      const data = await res.json();
      document.getElementById('count').textContent = data.count;
    }
    async function sendClick() {
      const res = await fetch('/api/click', { method: 'POST' });
      const data = await res.json();
      document.getElementById('count').textContent = data.count;
      document.getElementById('status').textContent = 'Click recorded!';
    }
    async function resetCount() {
      const res = await fetch('/api/reset', { method: 'POST' });
      const data = await res.json();
      document.getElementById('count').textContent = data.count;
      document.getElementById('status').textContent = 'Counter reset.';
    }
    document.getElementById('clickBtn').addEventListener('click', sendClick);
    document.getElementById('resetBtn').addEventListener('click', resetCount);
    fetchCount();
  </script>
</body>
</html>
